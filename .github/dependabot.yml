version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⚙️ chore"
      include: "scope"

  - package-ecosystem: "bun"
    directory: "/client"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⚙️ chore"
      include: "scope"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⚙️ chore"
      include: "scope"
