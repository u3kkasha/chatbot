name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-commits:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Commits
        uses: wagoid/commitlint-github-action@v6

  verify:
    name: Verify Codebase
    runs-on: ubuntu-latest
    # Optional: make verify depend on lint-commits
    # needs: lint-commits

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: determinateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        uses: determinateSystems/magic-nix-cache-action@v14

      - name: Install Dependencies
        run: |
          nix develop --command just server-restore
          nix develop --command just client-install

      - name: Run CI
        run: nix develop --command just ci
