name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".serena/**"
      - "AGENTS.md"
      - "CONTEXT.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".serena/**"
      - "AGENTS.md"
      - "CONTEXT.md"
  workflow_dispatch:

# Auto-cancel redundant runs for the same PR or branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-commits:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Commits
        uses: wagoid/commitlint-github-action@v6

  verify:
    name: Verify Codebase
    runs-on: ubuntu-latest
    needs: lint-commits # Fail fast: don't run heavy checks if commit lint fails
    timeout-minutes: 15 # Prevent hung jobs from burning all your minutes

    # Skip CI for changes that don't affect the code (docs, configs, etc.)
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'api/**'
              - 'src/**'
              - 'Directory.Packages.props'
              - 'Directory.Build.props'
            frontend:
              - 'client/**'
            infra:
              - 'docker-compose.yml'
              - 'flake.nix'
              - 'justfile'

      - name: Install Nix
        uses: determinateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        uses: determinateSystems/magic-nix-cache-action@v14

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'Directory.Build.props', 'dotnet-tools.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('client/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: |
          if [ "${{ steps.filter.outputs.backend }}" == 'true' ] || [ "${{ steps.filter.outputs.infra }}" == 'true' ]; then
            nix develop --command just server-restore
          fi
          if [ "${{ steps.filter.outputs.frontend }}" == 'true' ] || [ "${{ steps.filter.outputs.infra }}" == 'true' ]; then
            nix develop --command just client-install
          fi

      - name: Run CI (Selective)
        run: |
          # If infra/configs changed, run everything
          if [ "${{ steps.filter.outputs.infra }}" == 'true' ]; then
            nix develop --command just ci
          else
            # Otherwise, run only what changed
            if [ "${{ steps.filter.outputs.backend }}" == 'true' ]; then
              nix develop --command just server-lint
              nix develop --command just server-build
              nix develop --command just server-test
            fi
            if [ "${{ steps.filter.outputs.frontend }}" == 'true' ]; then
              nix develop --command just client-lint
              nix develop --command just client-typecheck
              nix develop --command just client-test
            fi
            # Always check formatting and API drift if anything changed
            nix develop --command just check-format
            nix develop --command just check-api-drift
          fi
