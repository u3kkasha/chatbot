services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    container_name: postgres-local
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: support_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d support_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant-local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite-local
    command: azurite --disableTelemetry -l /data --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    container_name: docling-serve-local
    environment:
      - DOCLING_SERVE_ENABLE_UI=false
      - OMP_NUM_THREADS=2
      - UVICORN_WORKERS=1
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  garnet:
    image: ghcr.io/microsoft/garnet:latest
    container_name: garnet-local
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "cat /dev/null > /dev/tcp/127.0.0.1/6379 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: docker.io/datalust/seq:latest
    container_name: seq-local
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      - ACCEPT_EULA=Y
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  garnet_data:
