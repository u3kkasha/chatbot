# Lefthook configuration for Chatbot project
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  commands:
    just-hooks:
      run: just hook-pre-commit

pre-push:
  commands:
    just-hooks:
      run: just hook-pre-push

commit-msg:
  commands:
    just-hooks:
      run: just hook-commit-msg {1}
